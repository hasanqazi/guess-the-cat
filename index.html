<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Guess the Cat 😼</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="container">
    <img class="cat" src="assets/images/bitmap.svg" alt="Cat SVG">
    <div class="pupil" id="left-pupil"></div>
    <div class="pupil" id="right-pupil"></div>
    <input type="text" id="guessInput" placeholder="Guess the Cat!" disabled>
    <div id="autocomplete-list" class="autocomplete-items"></div>
    <img class="paws" src="assets/images/paws.svg" alt="Cat Paws">
  </div>
  <div id="catImageContainer" class="placeholder-container">
    <p>Loading today's cat...</p>
  </div>
  <div class="circles-container">
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
  </div>
  <div id="statusMessage"></div>
  <div id="countdown"></div>
  <div class="popup-overlay" id="popupOverlay">
    <div class="popup">
      <p id="popupText"></p>
      <button id="closePopupBtn">Close</button>
    </div>
  </div>
  <script src="main.js"></script>
</body>

</html>
