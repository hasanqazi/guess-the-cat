<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Guess the Cat 😼</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'FOT-Seurat Pro B';
      src: url('font/FOT-Seurat Pro B.otf') format('opentype');
      font-weight: bold;
      font-style: normal;
    }

    * {
      font-family: 'FOT-Seurat Pro B', sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      background: url('background.svg') repeat;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      cursor: url('mouse.svg'), pointer;
    }

    .container {
      position: relative;
      width: 600px;
      text-align: center;
      transform: scale(1.0);
      z-index: 0;
      overflow: visible;
      margin-top: 50px;
    }

    .cat {
      position: absolute;
      top: -340%;
      left: 50%;
      transform: translateX(-50%);
      width: 1024px;
      height: auto;
      z-index: 1;
      pointer-events: none;
    }

    .paws {
      position: absolute;
      top: -340%;
      left: 50%;
      transform: translateX(-50%);
      width: 1024px;
      height: auto;
      z-index: 4;
      pointer-events: none;
    }

    .pupil {
      position: absolute;
      width: 28px;
      height: 36px;
      background: rgb(0, 0, 0);
      border-radius: 50%;
      z-index: 10;
      pointer-events: none;
    }

    #left-pupil {
      top: 60px;
      left: 190px;
    }

    #right-pupil {
      top: 60px;
      left: 290px;
    }

    input[type="text"] {
      width: 100%;
      padding: 20px;
      height: 29px;
      font-size: 1.4em;
      border: 2px solid #734c28;
      border-radius: 14px;
      box-shadow: 0 6px 10px rgba(0, 0, 0, 0.15);
      outline: none;
      z-index: 3;
      position: relative;
      background: #c18c55;
      text-align: center;
      font-family: 'FOT-Seurat Pro B', sans-serif;
      color: black;
    }

    input[type="text"]:hover {
      cursor: url('mouse.svg'), default;
    }

    ::placeholder {
      text-align: center;
      font-family: 'FOT-Seurat Pro B', sans-serif;
      color: black;
    }

    .placeholder-container {
      height: 400px;
      margin: 20px auto;
      text-align: center;
      padding-left: 1.5%;
      padding-top: 2%;
      padding-bottom: 2%;
    }

    .placeholder-container img {
      width: 100%;
      height: 100%;
      border-radius: 8px;
      object-fit: contain;
    }

    .circles-container {
      width: 600px;
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
    }

    .circle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background-color: white;
      border: 2px solid #ccc;
      transition: background-color 0.3s ease;
    }

    #statusMessage {
      font-size: 1.2rem;
      margin-top: 10px;
      color: #333;
    }

    #countdown {
      margin-top: 10px;
      font-size: 1.5rem;
      color: #333;
    }

    .popup-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(5px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .popup {
      background: #c18c55;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      max-width: 90%;
      border: 2px solid #734c28;
    }

    .popup button {
      margin-top: 10px;
      padding: 8px 16px;
      font-size: 1rem;
      border: none;
      border-radius: 4px;
      cursor: url('mouse.svg'), pointer;
      background-color: #734c28;
      color: black;
    }

    .autocomplete-items {
      position: absolute;
      top: 100%;
      left: 0;
      width: 107%;
      border: 1px solid #734c28;
      border-top: none;
      z-index: 5;
      background-color: #c18c55;
      max-height: 150px;
      overflow-y: auto;
      color: black;
      font-family: 'FOT-Seurat Pro B', sans-serif;
    }

    .autocomplete-item {
      padding: 10px;
      cursor: url('mouse.svg'), pointer;
      color: black;
      font-family: 'FOT-Seurat Pro B', sans-serif;
    }

    .autocomplete-item:hover {
      background-color: #734c28;
      cursor: url('mouse.svg'), pointer;
    }

    .autocomplete-active {
      background-color: #734c28;
      color: #ffffff;
    }

    .autocomplete-item.guessed {
      text-decoration: line-through;
      color: #666666;
      background-color: #a37747;
    }

    .autocomplete-item.guessed:hover {
      background-color: #a37747;
      cursor: not-allowed;
    }
  </style>
</head>

<body>
  <div class="container">
    <img class="cat" src="bitmap.svg" alt="Cat SVG">
    <div class="pupil" id="left-pupil"></div>
    <div class="pupil" id="right-pupil"></div>
    <input type="text" id="guessInput" placeholder="Guess the Cat!" disabled>
    <div id="autocomplete-list" class="autocomplete-items"></div>
    <img class="paws" src="paws.svg" alt="Cat Paws">
  </div>
  <div id="catImageContainer" class="placeholder-container">
    <p>Loading today's cat...</p>
  </div>
  <div class="circles-container">
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
  </div>
  <div id="statusMessage"></div>
  <div id="countdown"></div>
  <div class="popup-overlay" id="popupOverlay">
    <div class="popup">
      <p id="popupText"></p>
      <button id="closePopupBtn">Close</button>
    </div>
  </div>

  <script>
    let allCatNames = [];
    let correctCatName = "";
    let pixelatedImages = [];
    let currentImageLevel = 0;
    let isPixelatedMode = false;
    let guessedCats = new Set();
    let attempts = 0;
    let solved = false;
    const circles = document.querySelectorAll('.circle');

    const todayFormatted = (function (date) {
      const year = date.getFullYear();
      let month = date.getMonth() + 1;
      let day = date.getDate();
      if (month < 10) month = '0' + month;
      if (day < 10) day = '0' + day;
      return `${year}-${month}-${day}`;
    })(new Date());

    const gameStateKey = `gameState_${todayFormatted}`;
    const guessInput = document.getElementById('guessInput');
    const autocompleteList = document.getElementById('autocomplete-list');
    guessInput.disabled = true;

    function setPixelatedImage() {
      const catContainer = document.getElementById('catImageContainer');
      catContainer.innerHTML = `<img src="${pixelatedImages[currentImageLevel]}" referrerpolicy="no-referrer">`;
    }

    function saveGameState() {
      const gameState = {
        attempts,
        solved,
        guessedCats: Array.from(guessedCats),
        currentImageLevel,
        isPixelatedMode,
        correctCatName
      };
      localStorage.setItem(gameStateKey, JSON.stringify(gameState));
    }

    function loadGameState() {
      const savedState = localStorage.getItem(gameStateKey);
      if (savedState) {
        const gameState = JSON.parse(savedState);
        attempts = gameState.attempts || 0;
        solved = gameState.solved || false;
        guessedCats = new Set(gameState.guessedCats || []);
        currentImageLevel = gameState.currentImageLevel || 0;
        isPixelatedMode = gameState.isPixelatedMode || false;
        correctCatName = gameState.correctCatName;

        // Restore circle colors based on previous attempts
        circles.forEach((circle, i) => {
          if (i < attempts) {
            circle.style.backgroundColor = "#F44336"; // Red for wrong guesses
          } else if (solved && i === attempts) {
            circle.style.backgroundColor = "#4CAF50"; // Green for correct guess
          } else {
            circle.style.backgroundColor = "white"; // Remaining attempts
          }
        });

        // Update game UI based on state
        if (solved) {
          guessInput.disabled = true;
          document.getElementById('statusMessage').textContent = 
            `You have already guessed the cat for today, it was ${correctCatName}.`;
        } else if (attempts >= circles.length) {
          guessInput.disabled = true;
          document.getElementById('statusMessage').textContent = 
            `You didn't guess the cat for today, it was ${correctCatName}.`;
        } else {
          guessInput.disabled = false;
        }

        // Update pixelated image if applicable
        if (isPixelatedMode) {
          currentImageLevel = Math.min(attempts, 4);
          setPixelatedImage();
        }
      }
    }

    fetch('cats.json')
      .then(response => {
        if (!response.ok) throw new Error('Network error');
        return response.json();
      })
      .then(data => {
        const catContainer = document.getElementById('catImageContainer');
        const catData = data[todayFormatted];
        allCatNames = [...new Set(Object.values(data).map(cat => cat.name))];

        if (catData) {
          correctCatName = catData.name;
          if (catData.gametype === "pixelated") {
            isPixelatedMode = true;
            pixelatedImages = catData.pixelated || [];
            currentImageLevel = 0;
            setPixelatedImage();
          } else {
            catContainer.innerHTML = `<img src="${catData.image}" referrerpolicy="no-referrer">`;
          }
        } else {
          const allDates = Object.keys(data);
          const hash = Array.from(todayFormatted).reduce((acc, char) => acc + char.charCodeAt(0), 0);
          const index = hash % allDates.length;
          const fallbackCat = data[allDates[index]];
          correctCatName = fallbackCat.name;
          if (fallbackCat.gametype === "pixelated") {
            isPixelatedMode = true;
            pixelatedImages = fallbackCat.pixelated || [];
            currentImageLevel = 0;
            setPixelatedImage();
          } else {
            catContainer.innerHTML = `<img src="${fallbackCat.image}" referrerpolicy="no-referrer">`;
          }
        }

        // Always load game state after setting up today's cat
        loadGameState();

        // If it's a new day, reset everything and save
        const lastPlayDate = localStorage.getItem('lastPlayDate');
        if (lastPlayDate !== todayFormatted) {
          attempts = 0;
          solved = false;
          guessedCats = new Set();
          currentImageLevel = 0;
          guessInput.disabled = false;
          circles.forEach(circle => circle.style.backgroundColor = "white");
          document.getElementById('statusMessage').textContent = "";
          saveGameState();
        }
      })
      .catch(error => {
        console.error("Error loading cat data:", error);
        document.getElementById('catImageContainer').innerHTML = `<p>Error loading cat data.</p>`;
      });

    guessInput.addEventListener('input', function() {
      showSuggestions();
    });

    guessInput.addEventListener('click', function() {
      showSuggestions();
    });

    let currentFocus = -1;

    guessInput.addEventListener('keydown', function(e) {
      const items = autocompleteList.getElementsByClassName('autocomplete-item');
      
      if (e.key === "ArrowDown") {
        e.preventDefault();
        currentFocus++;
        addActive(items);
      }
      else if (e.key === "ArrowUp") {
        e.preventDefault();
        currentFocus--;
        addActive(items);
      }
      else if (e.key === "Enter") {
        e.preventDefault();
        if (currentFocus > -1 && items.length) {
          items[currentFocus].click();
        } else {
          submitGuess();
        }
      }
    });

    function showSuggestions() {
      const value = guessInput.value;
      autocompleteList.innerHTML = '';
      currentFocus = -1;
      
      if (!value && value !== "") return;
      
      const suggestions = allCatNames.filter(name =>
        name.toLowerCase().includes(value.toLowerCase())
      );
      
      suggestions.forEach((suggestion, index) => {
        const item = document.createElement('div');
        item.classList.add('autocomplete-item');
        if (guessedCats.has(suggestion.toLowerCase())) {
          item.classList.add('guessed');
        }
        item.textContent = suggestion;
        
        item.addEventListener('click', function() {
          if (!guessedCats.has(suggestion.toLowerCase())) {
            guessInput.value = suggestion;
            autocompleteList.innerHTML = '';
            submitGuess();
          }
        });
        
        item.addEventListener('mouseover', function() {
          if (!guessedCats.has(suggestion.toLowerCase())) {
            removeActive(autocompleteList.getElementsByClassName('autocomplete-item'));
            this.classList.add('autocomplete-active');
            currentFocus = index;
          }
        });
        
        item.addEventListener('mouseout', function() {
          this.classList.remove('autocomplete-active');
        });
        
        autocompleteList.appendChild(item);
      });
    }

    function addActive(items) {
      if (!items || !items.length) return;
      
      removeActive(items);
      
      if (currentFocus >= items.length) currentFocus = 0;
      if (currentFocus < 0) currentFocus = items.length - 1;
      
      items[currentFocus].classList.add('autocomplete-active');
      items[currentFocus].scrollIntoView({ block: 'nearest' });
      guessInput.value = items[currentFocus].textContent;
    }

    function removeActive(items) {
      Array.from(items).forEach(item => {
        item.classList.remove('autocomplete-active');
      });
    }

    const leftPupil = document.getElementById('left-pupil');
    const rightPupil = document.getElementById('right-pupil');
    const container = document.querySelector('.container');
    const eyeCenters = {
      left: { x: 245, y: -79 },
      right: { x: 349, y: -79 }
    };
    const maxMoveX = 8;
    const maxMoveY = 6;

    document.addEventListener('mousemove', (e) => {
      const rect = container.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;
      movePupil(leftPupil, eyeCenters.left, mouseX, mouseY);
      movePupil(rightPupil, eyeCenters.right, mouseX, mouseY);
    });

    function movePupil(pupil, center, mouseX, mouseY) {
      const dx = mouseX - center.x;
      const dy = mouseY - center.y;
      const angle = Math.atan2(dy, dx);
      const x = center.x + Math.cos(angle) * maxMoveX;
      const y = center.y + Math.sin(angle) * maxMoveY;
      pupil.style.left = `${x - 10}px`;
      pupil.style.top = `${y - 14}px`;
    }

    function updateCountdown() {
      const now = new Date();
      const tomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
      const diff = tomorrow - now;
      const hours = Math.floor(diff / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((diff % (1000 * 60)) / 1000);
      document.getElementById('countdown').textContent =
        `Countdown to next game: ${hours}h ${minutes}m ${seconds}s`;
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);

    function submitGuess() {
      const guess = guessInput.value.trim().toLowerCase();
      if (guess === "") return;
      
      guessedCats.add(guess);
      saveGameState(); // Save state immediately after adding the guess
      
      if (guess === correctCatName.toLowerCase()) {
        circles[attempts].style.backgroundColor = "#4CAF50";
        solved = true;
        finishGame(true);
      } else {
        circles[attempts].style.backgroundColor = "#F44336";
        attempts++;
        if (isPixelatedMode && attempts < 5) {
          currentImageLevel = Math.min(attempts, 4);
          setPixelatedImage();
        }
        saveGameState(); // Save state after updating attempts and image
        if (attempts >= circles.length) {
          finishGame(false);
        }
      }
      guessInput.value = "";
    }

    guessInput.addEventListener('keydown', (e) => {
      if (e.key === "Enter" && !solved) {
        submitGuess();
      }
    });

    function finishGame(correct) {
      let streak = Number(localStorage.getItem('streak')) || 0;
      let totalGuesses = attempts + (correct ? 1 : 0);
      let message = "";
      if (correct) {
        streak++;
        message = `You have guessed the cat for today, it was ${correctCatName}. Your current streak is ${streak}. It took you ${totalGuesses} guess${totalGuesses === 1 ? '' : 'es'}.`;
        let meowAudio = new Audio('meow.mp3');
        meowAudio.play();
        if (isPixelatedMode) {
          currentImageLevel = 4;
          setPixelatedImage();
        }
      } else {
        streak = 0;
        message = `You didn't guess the cat for today, it was ${correctCatName}. Your current streak is ${streak}.`;
        if (isPixelatedMode) {
          currentImageLevel = 4;
          setPixelatedImage();
        }
      }
      localStorage.setItem('streak', streak);
      localStorage.setItem('lastPlayDate', todayFormatted);
      localStorage.setItem('lastCat', correctCatName);
      document.getElementById('popupText').textContent = message;
      document.getElementById('popupOverlay').style.display = "flex";
      document.body.style.overflow = 'hidden';
      document.getElementById('statusMessage').textContent =
        correct ? `You have already guessed the cat for today, it was ${correctCatName}.` : `You didn't guess the cat for today, it was ${correctCatName}.`;
      guessInput.disabled = true;
      saveGameState();
    }

    document.getElementById('closePopupBtn').addEventListener('click', () => {
      document.getElementById('popupOverlay').style.display = "none";
      document.body.style.overflow = 'auto';
    });

    document.addEventListener('DOMContentLoaded', () => {
      leftPupil.style.left = `${eyeCenters.left.x - 14}px`;
      leftPupil.style.top = `${eyeCenters.left.y - 18}px`;
      rightPupil.style.left = `${eyeCenters.right.x - 14}px`;
      rightPupil.style.top = `${eyeCenters.right.y - 18}px`;
    });

    // Close dropdown when clicking outside
    document.addEventListener('click', function(e) {
        const isClickInsideInput = guessInput.contains(e.target);
        const isClickInsideDropdown = autocompleteList.contains(e.target);
        
        if (!isClickInsideInput && !isClickInsideDropdown) {
            autocompleteList.innerHTML = '';
        }
    });

    // Prevent dropdown from closing when clicking inside it
    autocompleteList.addEventListener('click', function(e) {
        e.stopPropagation();
    });
  </script>
</body>

</html>
